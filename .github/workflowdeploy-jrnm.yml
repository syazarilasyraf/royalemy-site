name: Deploy to JustRunMyApp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JustRunMyApp registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.JRNM_REGISTRY }}
          username: ${{ secrets.JRNM_DOCKER_USERNAME }}
          password: ${{ secrets.JRNM_DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.JRNM_IMAGE }} .
          docker push ${{ secrets.JRNM_IMAGE }}
