name: Deploy to JustRunMyApp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to registry
        run: |
          echo "${{ secrets.JRNM_DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.JRNM_DOCKER_USERNAME }}" \
            --password-stdin \
            ${{ secrets.JRNM_REGISTRY }}

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.JRNM_REGISTRY }}/${{ secrets.JRNM_IMAGE_NAME }}:${{ secrets.JRNM_IMAGE_TAG }}"

          docker build \
            --no-cache \
            --pull \
            --build-arg BUILD_ID=${GITHUB_SHA} \
            -t $IMAGE .

          docker push $IMAGE
