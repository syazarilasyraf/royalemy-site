name: Deploy to JustRunMyApp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to registry
        run: |
          echo "${{ secrets.JRNM_DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.JRNM_DOCKER_USERNAME }}" \
            --password-stdin \
            jdr-z84fc52po9.justrunmy.app

      - name: Build image (force fresh)
        run: |
          IMAGE="jdr-z84fc52po9.justrunmy.app/z84fc52po9:v16_autodeploy"

          docker build \
            --no-cache \
            --pull \
            --build-arg BUILD_ID=${GITHUB_SHA} \
            -t $IMAGE .

      - name: Push image
        run: |
          IMAGE="jdr-z84fc52po9.justrunmy.app/z84fc52po9:v16_autodeploy"

          docker push $IMAGE
