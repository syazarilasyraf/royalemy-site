name: Deploy to JustRunMyApp

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Login to registry
        run: |
          echo "${{ secrets.JRNM_DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.JRNM_DOCKER_USERNAME }}" \
            --password-stdin \
            jdr-q96jo84sc5.justrunmy.app

      - name: Build and push image
        run: |
          IMAGE="jdr-q96jo84sc5.justrunmy.app/q96jo84sc5:v1"

          docker build \
            --pull \
            --build-arg BUILD_ID=${GITHUB_SHA} \
            -t $IMAGE .

          docker push $IMAGE
