<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>Offline - RoyaleMY</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f8fafc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    .brand {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .message {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .btn:hover {
      background: #2563eb;
    }
    .home-link {
      display: block;
      margin-top: 1rem;
      color: #60a5fa;
      font-size: 0.875rem;
      text-decoration: none;
      font-weight: 500;
    }
    .home-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">👑</div>
    <div class="brand">RoyaleMY</div>
    <p class="message">You are offline.<br>Check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">🔄 Retry</button>
    <a class="home-link" href="/">← Back to Home</a>
  </div>
</body>
</html>
